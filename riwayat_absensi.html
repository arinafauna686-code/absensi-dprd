<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Absensi - DPRD Banyuwangi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; 
        }

        .sidebar { 
            min-height: 100vh; 
            background-color: #ffffff; 
            border-right: 1px solid #e9ecef; 
        }

        .brand-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0.5rem 0.25rem 1rem 0.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px dashed #e9ecef;
        }

        .brand-logo {
            height: 60px;
            width: auto;
            object-fit: contain;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
        }

        .brand-text {
            font-size: 0.78rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .nav-link { color: #6c757d; font-weight: 500; font-size: 0.95rem; }
        .nav-link.active { background-color: #0d6efd; color: white !important; border-radius: 8px; }

        .card-custom { 
            border-radius: 16px; 
            background: #ffffff; 
            border: 1px solid #eef2f5; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        }

        .img-thumb-absensi { 
            width: 44px; 
            height: 44px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer;
            transition: transform 0.2s;
        }

        .img-thumb-absensi:hover {
            transform: scale(1.1);
        }

        .badge-hadir { 
            background-color: #d1e7dd; 
            color: #0f5132; 
            font-weight: 600; 
            padding: 6px 12px; 
            border-radius: 6px; 
        }

        .badge-terlambat { 
            background-color: #ffecb5; 
            color: #664d03; 
            font-weight: 600; 
            padding: 6px 12px; 
            border-radius: 6px; 
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 col-lg-2 sidebar p-3 d-flex flex-column justify-content-between">
            <div>
                <div class="brand-sidebar">
                    <img src="Logo_DPRD_Banyuwangi.png" class="brand-logo" alt="Logo DPRD Banyuwangi">
                    <span class="brand-text">DPRD BANYUWANGI</span>
                </div>
                
                <ul class="nav nav-pills flex-column gap-1">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a href="absen_masuk.html" class="nav-link"><i class="bi bi-box-arrow-in-right me-2"></i> Absen Masuk</a>
                    </li>
                    <li class="nav-item">
                        <a href="absen_pulang.html" class="nav-link"><i class="bi bi-box-arrow-right me-2"></i> Absen Pulang</a>
                    </li>
                    <li class="nav-item">
                        <a href="riwayat_absensi.html" class="nav-link active"><i class="bi bi-clock-history me-2"></i> Riwayat Absensi</a>
                    </li>
                </ul>
            </div>

            <div>
                <hr class="text-secondary opacity-25">
                <a href="index.html" class="nav-link text-danger fw-semibold">
                    <i class="bi bi-box-arrow-left me-2"></i> Logout
                </a>
            </div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div class="d-inline-block bg-white px-3 py-2 rounded-3 border shadow-sm">
                    <span class="fw-bold text-dark"><i class="bi bi-clock-history me-2 text-primary"></i>Riwayat Absensi Pegawai</span>
                </div>
                <button class="btn btn-sm btn-outline-danger px-3 py-2 fw-semibold" onclick="hapusRiwayat()">
                    <i class="bi bi-trash me-1"></i> Bersihkan Riwayat
                </button>
            </div>

            <div class="card card-custom p-4">
                
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <h5 class="fw-bold text-dark mb-0">Daftar Log Kehadiran</h5>
                    <div class="input-group style-search" style="max-width: 300px;">
                        <span class="bg-light input-group-text border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="input-search" class="form-control bg-light border-start-0" placeholder="Cari nama pegawai..." onkeyup="filterRiwayat()">
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr class="text-secondary small">
                                <th>Tanggal</th>
                                <th>Nama / Jabatan</th>
                                <th>Jam Masuk</th>
                                <th>Jam Pulang</th>
                                <th class="text-center">Status</th>
                                <th class="text-center">Foto Selfie</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-riwayat-body">
                        </tbody>
                    </table>
                </div>

            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="modalFoto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-header-title fw-bold mb-0" id="modalNamaPegawai">Foto Selfie Absensi</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center p-4">
                <img id="imgFullSize" src="" class="img-fluid rounded-3 shadow" alt="Foto Selfie Full">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let globalData = [];

    function muatRiwayat() {
        const tbody = document.getElementById('tabel-riwayat-body');
        globalData = JSON.parse(localStorage.getItem('riwayat_absensi')) || [];

        if (globalData.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-1 d-block mb-2 text-secondary opacity-50"></i>
                        Belum ada data absensi yang terekam.<br>
                        <small class="text-muted">Silakan lakukan absensi terlebih dahulu pada menu <b>Absen Masuk</b> atau <b>Absen Pulang</b>.</small>
                    </td>
                </tr>`;
            return;
        }

        renderTabel(globalData);
    }

    function renderTabel(data) {
        const tbody = document.getElementById('tabel-riwayat-body');
        tbody.innerHTML = '';

        data.forEach((item) => {
            const badgeClass = item.status === 'Terlambat' ? 'badge-terlambat' : 'badge-hadir';
            const fotoSource = item.foto || 'https://via.placeholder.com/150';
            
            tbody.innerHTML += `
                <tr>
                    <td class="fw-semibold text-dark">${item.tanggal}</td>
                    <td>
                        <div class="fw-bold text-dark">${item.nama}</div>
                        <small class="text-muted">${item.jabatan || item.nip || '-'}</small>
                    </td>
                    <td class="text-primary fw-semibold">${item.masuk || '-'}</td>
                    <td class="text-warning-emphasis fw-semibold">${item.pulang || '-'}</td>
                    <td class="text-center">
                        <span class="${badgeClass}">${item.status}</span>
                    </td>
                    <td class="text-center">
                        <img src="${fotoSource}" class="img-thumb-absensi shadow-sm" alt="Foto Absen" onclick="previewFoto('${fotoSource}', '${item.nama}')">
                    </td>
                </tr>
            `;
        });
    }

    function filterRiwayat() {
        const keyword = document.getElementById('input-search').value.toLowerCase();
        const filteredData = globalData.filter(item => 
            item.nama.toLowerCase().includes(keyword) || 
            item.tanggal.toLowerCase().includes(keyword)
        );
        renderTabel(filteredData);
    }

    function previewFoto(src, nama) {
        document.getElementById('imgFullSize').src = src;
        document.getElementById('modalNamaPegawai').innerText = `Foto Selfie - ${nama}`;
        const modal = new bootstrap.Modal(document.getElementById('modalFoto'));
        modal.show();
    }

    function hapusRiwayat() {
        if (confirm("Apakah Anda yakin ingin menghapus semua catatan riwayat absensi?")) {
            localStorage.removeItem('riwayat_absensi');
            muatRiwayat();
        }
    }

    document.addEventListener('DOMContentLoaded', muatRiwayat);
</script>

</body>
</html>
