<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Absensi - DPRD Banyuwangi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
        }
        .logo-dprd {
            width: 90px;
            height: auto;
        }
    </style>
</head>
<body>

<div class="card card-login p-4">
    <div class="text-center mb-4">
        <img src="Logo_DPRD_Banyuwangi.png" alt="Logo DPRD" class="logo-dprd mb-2">
        <h5 class="fw-bold mb-0">ABSENSI PEGAWAI</h5>
        <small class="text-muted fw-semibold">SEKRETARIAT DPRD KABUPATEN BANYUWANGI</small>
    </div>

    <div id="error-alert" class="alert alert-danger py-2 text-center small rounded-3 d-none" role="alert">
        Password salah!
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label class="form-label small text-muted fw-semibold">Username / NIP</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan Username" required autocomplete="off">
        </div>
        <div class="mb-3">
            <label class="form-label small text-muted fw-semibold">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan Password dari Admin" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-bold">Login</button>
    </form>
</div>

<script>
    function handleLogin(event) {
        event.preventDefault();

        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value.trim();
        const errorAlert = document.getElementById('error-alert');

        const validPassword = "dprdbanyuwangi";

        if (passwordInput === validPassword) {
            errorAlert.classList.add('d-none');

            // Format nama dari username
            let formattedName = usernameInput.replace(/[._]/g, ' ');
            formattedName = formattedName.replace(/\b\w/g, char => char.toUpperCase());

            const userProfile = {
                username: usernameInput,
                nama: formattedName || "Pegawai",
                jabatan: "Pegawai Sekretariat DPRD"
            };

            // Simpan profil user ke sessionStorage
            sessionStorage.setItem('loggedInUser', JSON.stringify(userProfile));

            // Redirect ke halaman dashboard.html
            window.location.href = 'dashboard.html';
        } else {
            errorAlert.classList.remove('d-none');
        }
    }
</script>

</body>
</html>
